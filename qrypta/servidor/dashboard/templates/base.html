<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard Bastion{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-[#1e293b] text-white px-6 py-4 flex items-center justify-between shadow-lg">
        <div class="text-2xl font-bold tracking-tight">Qrypta Admin</div>
        <div class="space-x-4">
            <a href="/dashboard" class="hover:underline hover:text-[#2563eb] transition">Inicio</a>
            <a href="/dashboard/auditoria" class="hover:underline hover:text-[#2563eb] transition">Auditoría</a>
            <a href="/dashboard/estado" class="hover:underline hover:text-[#2563eb] transition">Estado</a>
        </div>
    </nav>
    <main class="container mx-auto py-8">
        {% block content %}{% endblock %}
    </main>
    <footer class="text-center text-xs text-[#64748b] py-4">Qrypta &copy; 2026</footer>
</body>
</html>
