name: ci-nucleo

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  test-nucleo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r qrypta/servidor/requirements.txt

      - name: Ejecutar tests del nucleo
        run: |
          pytest qrypta/nucleo_crypto/tests -q
