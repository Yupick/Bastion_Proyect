name: CI Admin Dashboard Web

on:
  push:
    paths:
      - 'qrypta/servidor/dashboard_admin_web/**'
      - '.github/workflows/ci-admin-dashboard-web.yml'
  pull_request:
    paths:
      - 'qrypta/servidor/dashboard_admin_web/**'
      - '.github/workflows/ci-admin-dashboard-web.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qrypta/servidor/dashboard_admin_web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: qrypta/servidor/dashboard_admin_web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
